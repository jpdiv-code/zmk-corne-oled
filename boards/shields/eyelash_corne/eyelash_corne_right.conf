# Enable SPI
CONFIG_SPI=y
#EXT POWER
CONFIG_ZMK_EXT_POWER=y
CONFIG_INPUT=y

# enable display drivers
CONFIG_ZMK_DISPLAY=y
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# OLED Peripheral: custom animation (replaces spaceman assets in fork)
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y

# Center rotated 32x128 frames on 68x160 canvas: X=(68-32)/2=18 (default), Y=(160-128)/2=16
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_Y=16

# Speed up animation ~37% (default 4800ms for 20 frames)
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS=3000

